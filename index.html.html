<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background: #333;
            color: white;
            padding: 20px;
        }

        nav {
            background: #555;
            padding: 10px;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        section {
            padding: 20px;
        }

        .project {
            border: 1px solid #ccc;
            padding: 15px;
            margin: 10px;
        }

        button {
            padding: 10px;
            cursor: pointer;
        }

        img {
            width: 150px;
            border-radius: 50%;
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav {
                display: flex;
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Shivam Nautiyal</h1>
    <p>Web Developer | BCA Student</p>
</header>

<nav>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
</nav>

<section id="about">
    <h2>About Me</h2>
    <img src="https://via.placeholder.com/150" alt="Profile Photo">
    <p>I am learning web development and programming.</p>
</section>

<section id="projects">
    <h2>Projects</h2>
    <div class="project">
        <h3>Bus Management System</h3>
        <p>Created using C and Python.</p>
        <button onclick="showMessage()">View Details</button>
    </div>
</section>

<section id="contact">
    <h2>Contact</h2>
    <button onclick="contactMe()">Click to Contact</button>
</section>

<footer>
    <p>© 2026 Shivam</p>
</footer>

<script>
    function showMessage() {
        alert("This is my Bus Management System project!");
    }

    function contactMe() {
        alert("Email: shivam@example.com");
    }
</script>

</body>
</html>
